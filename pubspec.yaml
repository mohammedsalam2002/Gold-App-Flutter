name: gold_app
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Internationalization
  intl: ^0.20.2

  #Firebase & Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  firebase_messaging: ^15.1.3  # للإشعارات لاحقاً
  
  # Supabase ← جديد
  supabase_flutter: ^2.3.4


  # HTTP لجلب البيانات من API
  http: ^1.2.0

  # Local Storage / Cache
  shared_preferences: ^2.2.2

  # Ads
  google_mobile_ads: ^5.1.0

  # UI Helpers
  flutter_localizations:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  flutter_screenutil: ^5.9.0



dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0
  

  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9


flutter:


  uses-material-design: true
  generate: true # for l10n (localization)


  assets:
    - assets/images/

fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700